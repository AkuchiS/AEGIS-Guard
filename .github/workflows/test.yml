name: tests
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  selftest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run self-tests (injection-guard + output-qc, stdlib only)
        run: python aegis_cli.py selftest
